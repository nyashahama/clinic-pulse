name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: dependency-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        continue-on-error: true
        uses: actions/dependency-review-action@v4

      - name: Dependency graph note
        run: |
          echo "Dependency Review is advisory because it requires GitHub Dependency Graph to be enabled for this repository."
          echo "Enable it in repository security settings before making this workflow blocking."
