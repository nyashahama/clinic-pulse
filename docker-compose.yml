services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clinicpulse
      POSTGRES_USER: clinicpulse
      POSTGRES_PASSWORD: clinicpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicpulse -d clinicpulse"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
